name: test

# Conformance test for the Vyges Loom sign-off engines driven through `vyges mcp`.
# Two jobs:
#   deterministic — replays known-good tool calls (no LLM); this GATES.
#   agentic       — a free GitHub Models LLM must pick the tool + form its args from
#                   the engine descriptors alone. ADVISORY (model output isn't
#                   bit-reproducible), so it never fails the workflow.

on:
  workflow_dispatch:
  pull_request:
  schedule:
    - cron: "0 6 * * 1"   # weekly, Monday 06:00 UTC

permissions:
  contents: read
  models: read            # free GitHub Models access for public repos

jobs:
  deterministic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install the Vyges CLI
        # cargo-dist installer for the public CLI. Confirm/adjust the URL for your setup.
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf \
            https://github.com/vyges/cli/releases/latest/download/vyges-installer.sh | sh
          echo "$HOME/.vyges/bin" >> "$GITHUB_PATH"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install the Loom engines
        run: vyges install loom

      - name: Deterministic conformance (gates)
        run: |
          python3 conformance.py cases.json --driver echo --report report-echo.json | tee out.txt
          {
            echo '## Deterministic conformance (echo)';
            echo '```'; cat out.txt; echo '```';
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        with:
          name: report-echo
          path: report-echo.json

  agentic:
    runs-on: ubuntu-latest
    needs: deterministic
    strategy:
      fail-fast: false
      matrix:
        model:
          - openai/gpt-4o-mini
          - openai/gpt-4o
    steps:
      - uses: actions/checkout@v4

      - name: Install the Vyges CLI
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf \
            https://github.com/vyges/cli/releases/latest/download/vyges-installer.sh | sh
          echo "$HOME/.vyges/bin" >> "$GITHUB_PATH"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install the Loom engines
        run: vyges install loom

      - name: Agentic conformance (advisory) — ${{ matrix.model }}
        continue-on-error: true          # advisory: a model miss / rate-limit never fails CI
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          slug=$(echo '${{ matrix.model }}' | tr '/:' '__')
          python3 conformance.py cases.json --driver github --model '${{ matrix.model }}' \
            --report "report-github-$slug.json" | tee out.txt
          {
            echo "## Agentic conformance — ${{ matrix.model }}";
            echo '```'; cat out.txt; echo '```';
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        with:
          name: report-github-${{ strategy.job-index }}
          path: report-github-*.json
